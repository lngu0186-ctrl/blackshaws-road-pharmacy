<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background transparent for white version -->

  <!-- Mortar and pestle icon - left side (white) -->
  <g transform="translate(15, 25)" fill="none" stroke="white" stroke-width="2.5">
    <!-- Mortar (bowl) -->
    <path d="M15,30 Q5,50 15,70 L40,70 Q50,50 40,30 Z" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pestle handle -->
    <line x1="27" y1="20" x2="27" y2="65" stroke-linecap="round"/>
    <!-- Pestle head -->
    <ellipse cx="27" cy="17" rx="6" ry="3" fill="white"/>
  </g>

  <!-- Text: "Blackshaws Road" - cursive/serif (white) -->
  <text x="70" y="50" font-family="'Crimson Pro', Georgia, serif" font-size="28" font-weight="400" fill="white" font-style="italic">
    Blackshaws Road
  </text>

  <!-- Text: "PHARMACY" - bold uppercase (white) -->
  <text x="70" y="82" font-family="'Inter', sans-serif" font-size="32" font-weight="700" fill="white" letter-spacing="2">
    PHARMACY
  </text>

  <!-- EST. 1968 badge (navy with white text - same as dark version for consistency) -->
  <rect x="70" y="88" width="65" height="22" rx="11" fill="#1B2A6B"/>
  <text x="102" y="105" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">EST. 1968</text>

  <!-- Alliance Pharmacy logo - bottom right (keep original colors) -->
  <g transform="translate(320, 70)" opacity="0.95">
    <!-- Red background square with rounded corners -->
    <rect x="0" y="0" width="72" height="42" rx="6" fill="#C0392B"/>
    <!-- Blue cross -->
    <g fill="#1B2A6B">
      <!-- Vertical bar -->
      <rect x="33" y="4" width="6" height="34" rx="1"/>
      <!-- Horizontal bar -->
      <rect x="4" y="17" width="64" height="6" rx="1"/>
    </g>
    <!-- Alliance text below cross -->
    <text x="36" y="58" font-family="'Inter', sans-serif" font-size="7" font-weight="600" fill="#6B7280" text-anchor="middle">Alliance</text>
  </g>
</svg>
